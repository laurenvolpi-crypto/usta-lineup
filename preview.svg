<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B1A2E"/>
      <stop offset="100%" style="stop-color:#152238"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1E2D45"/>
      <stop offset="100%" style="stop-color:#152238"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Tennis ball icon -->
  <circle cx="96" cy="96" r="44" fill="#C8E63C"/>
  <path d="M 64 72 Q 96 96 64 120" fill="none" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <path d="M 128 72 Q 96 96 128 120" fill="none" stroke="white" stroke-width="5" stroke-linecap="round"/>

  <!-- App title -->
  <text x="158" y="80" font-family="'Arial Black', Arial, sans-serif" font-weight="900" font-size="52" fill="white" letter-spacing="3">TENNIS LINEUP</text>
  <text x="158" y="132" font-family="'Arial Black', Arial, sans-serif" font-weight="900" font-size="52" fill="#C8A951" letter-spacing="3">OPTIMIZER</text>

  <!-- Gold divider -->
  <rect x="96" y="168" width="80" height="4" fill="#C8A951" rx="2"/>

  <!-- Tagline -->
  <text x="96" y="220" font-family="Arial, sans-serif" font-size="26" fill="rgba(255,255,255,0.7)" letter-spacing="0.5">Smart lineups for USTA tennis captains</text>

  <!-- Line cards preview -->
  <!-- S1 card -->
  <rect x="96" y="268" width="220" height="80" rx="10" fill="url(#card)" stroke="rgba(200,169,81,0.3)" stroke-width="1"/>
  <rect x="96" y="268" width="6" height="80" rx="3" fill="#C8A951"/>
  <text x="118" y="298" font-family="'Arial Black', Arial, sans-serif" font-weight="700" font-size="13" fill="#C8A951" letter-spacing="1">S1 — SINGLES</text>
  <rect x="118" y="310" width="60" height="8" rx="4" fill="rgba(52,211,153,0.3)"/>
  <rect x="184" y="310" width="100" height="8" rx="4" fill="rgba(255,255,255,0.1)"/>
  <rect x="118" y="326" width="80" height="8" rx="4" fill="rgba(255,255,255,0.08)"/>

  <!-- D1 card -->
  <rect x="334" y="268" width="220" height="80" rx="10" fill="url(#card)" stroke="rgba(200,169,81,0.3)" stroke-width="1"/>
  <rect x="334" y="268" width="6" height="80" rx="3" fill="#C8A951"/>
  <text x="356" y="298" font-family="'Arial Black', Arial, sans-serif" font-weight="700" font-size="13" fill="#C8A951" letter-spacing="1">D1 — DOUBLES</text>
  <rect x="356" y="310" width="80" height="8" rx="4" fill="rgba(52,211,153,0.3)"/>
  <rect x="356" y="326" width="60" height="8" rx="4" fill="rgba(255,255,255,0.08)"/>
  <rect x="356" y="326" width="140" height="8" rx="4" fill="rgba(255,255,255,0.08)"/>

  <!-- D2 card -->
  <rect x="572" y="268" width="220" height="80" rx="10" fill="url(#card)" stroke="rgba(200,169,81,0.3)" stroke-width="1"/>
  <rect x="572" y="268" width="6" height="80" rx="3" fill="#C8A951"/>
  <text x="594" y="298" font-family="'Arial Black', Arial, sans-serif" font-weight="700" font-size="13" fill="#C8A951" letter-spacing="1">D2 — DOUBLES</text>
  <rect x="594" y="310" width="100" height="8" rx="4" fill="rgba(251,191,36,0.3)"/>
  <rect x="594" y="326" width="75" height="8" rx="4" fill="rgba(255,255,255,0.08)"/>

  <!-- D3 card -->
  <rect x="810" y="268" width="294" height="80" rx="10" fill="url(#card)" stroke="rgba(200,169,81,0.3)" stroke-width="1"/>
  <rect x="810" y="268" width="6" height="80" rx="3" fill="#C8A951"/>
  <text x="832" y="298" font-family="'Arial Black', Arial, sans-serif" font-weight="700" font-size="13" fill="#C8A951" letter-spacing="1">D3 — DOUBLES</text>
  <rect x="832" y="310" width="70" height="8" rx="4" fill="rgba(248,113,113,0.3)"/>
  <rect x="832" y="326" width="120" height="8" rx="4" fill="rgba(255,255,255,0.08)"/>

  <!-- Feature pills -->
  <rect x="96" y="388" width="190" height="36" rx="18" fill="rgba(200,169,81,0.15)" stroke="rgba(200,169,81,0.4)" stroke-width="1"/>
  <text x="191" y="412" font-family="Arial, sans-serif" font-size="15" fill="#C8A951" text-anchor="middle">&#127942; Lineup Optimizer</text>

  <rect x="302" y="388" width="190" height="36" rx="18" fill="rgba(200,169,81,0.15)" stroke="rgba(200,169,81,0.4)" stroke-width="1"/>
  <text x="397" y="412" font-family="Arial, sans-serif" font-size="15" fill="#C8A951" text-anchor="middle">&#129309; Partnership Tracking</text>

  <rect x="508" y="388" width="190" height="36" rx="18" fill="rgba(200,169,81,0.15)" stroke="rgba(200,169,81,0.4)" stroke-width="1"/>
  <text x="603" y="412" font-family="Arial, sans-serif" font-size="15" fill="#C8A951" text-anchor="middle">&#128269; Opponent Scouting</text>

  <rect x="714" y="388" width="190" height="36" rx="18" fill="rgba(200,169,81,0.15)" stroke="rgba(200,169,81,0.4)" stroke-width="1"/>
  <text x="809" y="412" font-family="Arial, sans-serif" font-size="15" fill="#C8A951" text-anchor="middle">&#128200; Confidence Scores</text>

  <!-- Bottom domain -->
  <text x="600" y="560" font-family="Arial, sans-serif" font-size="22" fill="rgba(255,255,255,0.4)" text-anchor="middle" letter-spacing="2">tennislineup.ai</text>

  <!-- Bottom gold line accent -->
  <rect x="0" y="610" width="1200" height="4" fill="#C8A951" opacity="0.6"/>
</svg>
